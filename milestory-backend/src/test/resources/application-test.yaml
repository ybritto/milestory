spring:
  datasource:
    url: jdbc:postgresql://${MILESTORY_TEST_DB_HOST:localhost}:${MILESTORY_TEST_DB_PORT:5432}/${MILESTORY_TEST_DB_NAME:MILESTORY_test}
    username: ${MILESTORY_TEST_DB_USERNAME:milestory}
    password: ${MILESTORY_TEST_DB_PASSWORD:milestory}
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yaml